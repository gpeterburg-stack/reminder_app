name: Flutter Build APK

on:
  push:
    branches:
      - main  # Сборка будет запускаться при пуше в ветку main

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    # 1. Клонируем репозиторий
    - name: Checkout code
      uses: actions/checkout@v4

    # 2. Настраиваем Java (необходима для сборки Android)
    - name: Set up JDK
      uses: actions/setup-java@v3
      with:
        distribution: 'temurin'
        java-version: '17'

    # 3. Устанавливаем Flutter SDK
    - name: Set up Flutter
      uses: subosito/flutter-action@v2
      with:
        channel: 'stable' # Можно указать конкретную версию, например: '3.19.0'

    # 4. Загружаем зависимости проекта
    - name: Install dependencies
      run: flutter pub get

    # 5. Собираем APK (неподписанный релизный билд)
    - name: Build APK
      run: flutter build apk --release

    # 6. Сохраняем готовый файл в артефакты GitHub
    - name: Upload APK Artifact
      uses: actions/upload-artifact@v4
      with:
        name: flutter-app-release
        path: build/app/outputs/flutter-apk/app-release.apk
